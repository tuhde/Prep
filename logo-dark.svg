<?xml version="1.0" encoding="UTF-8" standalone="no"?>
<svg
   viewBox="0 0 179 36"
   width="179"
   height="36"
   version="1.1"
   id="svg6"
   xmlns="http://www.w3.org/2000/svg"
   xmlns:svg="http://www.w3.org/2000/svg">
  <defs
     id="defs6" />
  <!-- control point handle lines -->
  <line
     x1="5"
     y1="31"
     x2="49"
     y2="31"
     stroke="#c8c8c8"
     stroke-width="1"
     id="line1"
     style="stroke:#373737" />
  <line
     x1="115"
     y1="5"
     x2="75"
     y2="5"
     stroke="#c8c8c8"
     stroke-width="1"
     id="line2"
     style="stroke:#373737" />
  <!-- control point handle tips -->
  <circle
     cx="49"
     cy="31"
     r="2.5"
     fill="none"
     stroke="#c8c8c8"
     stroke-width="1"
     id="circle2"
     style="stroke:#373737" />
  <circle
     cx="75"
     cy="5"
     r="2.5"
     fill="none"
     stroke="#c8c8c8"
     stroke-width="1"
     id="circle3"
     style="stroke:#373737" />
  <!-- bezier path (solid) -->
  <path
     d="m 5,30.999997 c 44,0 70,-25.9999995 110,-25.9999995"
     fill="none"
     stroke="#1a1a1a"
     stroke-width="2.5"
     stroke-linecap="round"
     id="path3"
     style="stroke:#e5e5e5" />
  <!-- dashed continuation &#8212; the cut about to happen -->
  <path
     d="m 115,4.9999975 h 62"
     fill="none"
     stroke="#ff6b2b"
     stroke-width="2.5"
     stroke-dasharray="7, 5"
     stroke-linecap="round"
     id="path4" />
  <!-- trailing dot &#8212; path fades forward -->
  <circle
     cx="177"
     cy="5"
     r="2"
     fill="#ff6b2b"
     opacity="0.4"
     id="circle4" />
  <!-- node A &#8212; start of path -->
  <circle
     cx="5"
     cy="31"
     r="5"
     fill="#1a1a1a"
     id="circle5"
     style="fill:#e5e5e5" />
  <!-- node B &#8212; transition point, accent colour -->
  <circle
     cx="115"
     cy="5"
     r="5"
     fill="#ff6b2b"
     id="circle6" />
  <!-- wordmark -->
</svg>
